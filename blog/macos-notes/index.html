      (function () {
        function apply() {

          el.dataset.theme = localStorage.getItem('theme') || el.dataset.theme || 'ink';
          el.dataset.mode = localStorage.getItem('mode') || el.dataset.mode || 'light';
        }
        function onClick(e) {
          var modeBtn = e.target.closest('[data-toggle-mode]');
          if (modeBtn) {
            var cur = document.documentElement.dataset.mode === 'dark' ? 'dark' : 'light';
            var next = cur === 'dark' ? 'light' : 'dark';
            try {
              localStorage.setItem('mode', next);
            } catch (_) {}
            document.documentElement.dataset.mode = next;
            return;
          }
          var themeBtn = e.target.closest('[data-set-theme]');
          if (themeBtn) {
            var t = themeBtn.getAttribute('data-set-theme');
            try {
              localStorage.setItem('theme', t);
            } catch (_) {}
            document.documentElement.dataset.theme = t;
            var menu = themeBtn.closest('details');
            if (menu) menu.open = false;

        if (!window.__themeBound) {
